style:
  font_name: "A P-OTF A1Gothic StdN"
  font_size: 35
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline_width: 3
  bold: true
  position_y: -85            # 縦位置 (% of height, -100=最下部 〜 0=中央 〜 100=最上部)
  position_x: 0              # 横位置 (% of width, -100=左端 〜 0=中央 〜 100=右端)

whisper:
  model: "medium"
  language: "ja"

segment:
  max_chars: 25
  max_duration: 4.0
  min_duration: 0.3
  silence_threshold: 0.5

output:
  desktop_export: true
  keep_subtitle_file: true
