style:
  font_name: "Noto Sans JP"
  font_name_en: "Inter"
  font_size: 60
  font_size_en: 56
  bold: true
  bold_en: true
  outline_width: 6
  outline_width_en: 5
  position_y: -40              # 縦位置: 画面高さに対する% (0=中央, -40 ≈ 画面下から10〜14%, -50より下は画面外に注意)
  position_x: 0

whisper:
  model: "medium"
  language: "ja"

segment:
  max_chars: 25
  max_duration: 4.0
  min_duration: 0.3
  silence_threshold: 0.5

output:
  desktop_export: true
  keep_subtitle_file: true
